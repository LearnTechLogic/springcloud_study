server:
  port: 8080
spring:
  application:
    name: springboot-mybatis
  datasource:
    url: jdbc:mysql://localhost:3306/springboot_mybatis?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zxh.springbootmybatis.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    use-generated-keys: true
    default-statement-timeout: 60
knife4j:
  enable: true  # 开启 Knife4j
  openapi:
    title: 学生管理系统接口文档
    description: SpringBoot+MyBatis 项目接口测试
    version: 1.0.0

